# Example configuration for local development.
# Copy to application.properties (ignored by git) and fill values via env.

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/suvidha}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Override via env in production
jwt.secret=${JWT_SECRET:change-me-please-change-me-please-change-me-please-change-me-please}
jwt.expMillis=${JWT_EXP_MILLIS:1800000}
