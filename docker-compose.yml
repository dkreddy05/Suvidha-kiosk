version: "3.9"

# =============================================================
#  SUVIDHA – Infrastructure Services
# =============================================================

services:

  # -----------------------------------------------------------
  #  PostgreSQL 15
  # -----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: suvidha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: suvidha_db
      POSTGRES_USER: suvidha
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suvidha -d suvidha_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  Redis 7
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: suvidha-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  pgAdmin 4
  # -----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: suvidha-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@suvidha.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - suvidha-net

# =============================================================
#  Volumes & Networks
# =============================================================

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  suvidha-net:
    driver: bridge
