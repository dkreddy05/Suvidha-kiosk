# =============================================================
#  SUVIDHA – Full Stack docker-compose
#  Infrastructure + Application Services + Frontend Kiosk
#
#  Usage:
#    docker compose up --build          (first time)
#    docker compose up -d               (subsequent runs)
#    docker compose logs -f suvidha-billing
# =============================================================

services:

  # -----------------------------------------------------------
  #  PostgreSQL 15 (auth + billing use Postgres)
  # -----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: suvidha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: suvidha_auth_db
      POSTGRES_USER: suvidha
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suvidha_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suvidha -d suvidha_auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  Redis 7 (OTP caching, session tokens)
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: suvidha-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save "60 1" --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  Auth Service (port 8081)
  # -----------------------------------------------------------
  suvidha-auth:
    build:
      context: .
      dockerfile: suvidha-auth/Dockerfile
    container_name: suvidha-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/suvidha_auth_db
      SPRING_DATASOURCE_USERNAME: suvidha
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-suvidha_pass}
      SPRING_DATASOURCE_HIKARI_MINIMUMIDLE: 5
      SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE: 20
      SPRING_DATASOURCE_HIKARI_CONNECTIONTIMEOUT: 30000
      REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-256-bit-key-minimum-32-characters}
      AADHAR_ENCRYPTION_KEY: ${AADHAR_ENCRYPTION_KEY:-change-me-to-32-byte-aes-key!!!!}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SERVER_PORT: 8081
      JAVA_TOOL_OPTIONS: "-Xmx384m"
    volumes:
      - ./logs/auth-service:/workspace/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  Billing Service (port 8082)
  # -----------------------------------------------------------
  suvidha-billing:
    build:
      context: .
      dockerfile: suvidha-billing/Dockerfile
    container_name: suvidha-billing
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/suvidha_auth_db
      SPRING_DATASOURCE_USERNAME: suvidha
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-suvidha_pass}
      SPRING_DATASOURCE_HIKARI_MINIMUMIDLE: 5
      SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE: 20
      SPRING_DATASOURCE_HIKARI_CONNECTIONTIMEOUT: 30000
      REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-256-bit-key-minimum-32-characters}
      SERVER_PORT: 8082
      AUTH_SERVICE_URL: http://suvidha-auth:8081
      JAVA_TOOL_OPTIONS: "-Xmx384m"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  Grievance Service (port 8083)
  # -----------------------------------------------------------
  suvidha-grievance:
    build:
      context: .
      dockerfile: suvidha-grievance/Dockerfile
    container_name: suvidha-grievance
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/suvidha_auth_db
      SPRING_DATASOURCE_USERNAME: suvidha
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-suvidha_pass}
      SPRING_DATASOURCE_HIKARI_MINIMUMIDLE: 5
      SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE: 20
      SPRING_DATASOURCE_HIKARI_CONNECTIONTIMEOUT: 30000
      SERVER_PORT: 8083
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-256-bit-key-minimum-32-characters}
      AUTH_SERVICE_URL: http://suvidha-auth:8081
      JAVA_TOOL_OPTIONS: "-Xmx384m"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  Connections Service (port 8084)
  # -----------------------------------------------------------
  suvidha-connections:
    build:
      context: .
      dockerfile: suvidha-connections/Dockerfile
    container_name: suvidha-connections
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/suvidha_auth_db
      SPRING_DATASOURCE_USERNAME: suvidha
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-suvidha_pass}
      SPRING_DATASOURCE_HIKARI_MINIMUMIDLE: 5
      SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE: 20
      SPRING_DATASOURCE_HIKARI_CONNECTIONTIMEOUT: 30000
      SERVER_PORT: 8084
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-256-bit-key-minimum-32-characters}
      AUTH_SERVICE_URL: http://suvidha-auth:8081
      JAVA_TOOL_OPTIONS: "-Xmx384m"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  Notification Service (port 8085)
  # -----------------------------------------------------------
  suvidha-notification:
    build:
      context: .
      dockerfile: suvidha-notification/Dockerfile
    container_name: suvidha-notification
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/suvidha_auth_db
      SPRING_DATASOURCE_USERNAME: suvidha
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-suvidha_pass}
      SPRING_DATASOURCE_HIKARI_MINIMUMIDLE: 5
      SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE: 20
      SPRING_DATASOURCE_HIKARI_CONNECTIONTIMEOUT: 30000
      REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SERVER_PORT: 8085
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-256-bit-key-minimum-32-characters}
      JAVA_TOOL_OPTIONS: "-Xmx384m"
    volumes:
      - ./logs/notification-service:/workspace/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  Admin Service (port 8086)
  # -----------------------------------------------------------
  suvidha-admin:
    build:
      context: .
      dockerfile: suvidha-admin/Dockerfile
    container_name: suvidha-admin
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/suvidha_auth_db
      SPRING_DATASOURCE_USERNAME: suvidha
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-suvidha_pass}
      SPRING_DATASOURCE_HIKARI_MINIMUMIDLE: 5
      SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE: 20
      SPRING_DATASOURCE_HIKARI_CONNECTIONTIMEOUT: 30000
      REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SERVER_PORT: 8086
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-256-bit-key-minimum-32-characters}
      AUTH_SERVICE_URL: http://suvidha-auth:8081
      JAVA_TOOL_OPTIONS: "-Xmx384m"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  API Gateway (port 8080) — routes all /api/** traffic
  # -----------------------------------------------------------
  suvidha-gateway:
    build:
      context: .
      dockerfile: suvidha-gateway/Dockerfile
    container_name: suvidha-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/suvidha_auth_db
      SPRING_DATASOURCE_USERNAME: suvidha
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-suvidha_pass}
      REDIS_HOST: suvidha-redis
      AUTH_SERVICE_URL: http://suvidha-auth:8081
      BILLING_SERVICE_URL: http://suvidha-billing:8082
      GRIEVANCE_SERVICE_URL: http://suvidha-grievance:8083
      CONNECTIONS_SERVICE_URL: http://suvidha-connections:8084
      NOTIFICATION_SERVICE_URL: http://suvidha-notification:8085
      ADMIN_SERVICE_URL: http://suvidha-admin:8086
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-secure-256-bit-key-minimum-32-characters}
      JAVA_TOOL_OPTIONS: "-Xmx384m"
    depends_on:
      postgres:
        condition: service_healthy
      suvidha-auth:
        condition: service_healthy
      suvidha-billing:
        condition: service_healthy
      suvidha-grievance:
        condition: service_healthy
      suvidha-connections:
        condition: service_healthy
      suvidha-notification:
        condition: service_healthy
      suvidha-admin:
        condition: service_healthy
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  Kiosk Frontend (port 3000) — citizen portal
  #  Served via nginx; proxies /api/* to the gateway
  # -----------------------------------------------------------
  suvidha-kiosk:
    build:
      context: .
      dockerfile: apps/citizen/Dockerfile
    container_name: suvidha-kiosk
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: /
    depends_on:
      - suvidha-gateway
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  pgAdmin 4 (admin UI for PostgreSQL on port 5050)
  # -----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: suvidha-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@suvidha.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  Prometheus (metrics collection on port 9090)
  # -----------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: suvidha-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  Grafana (dashboards on port 3001)
  # -----------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: suvidha-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  Zipkin (distributed tracing on port 9411)
  # -----------------------------------------------------------
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: suvidha-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  Nginx Reverse Proxy (SSL termination on port 443/80)
  # -----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: suvidha-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - suvidha-gateway
    networks:
      - suvidha-net

  # -----------------------------------------------------------
  #  PostgreSQL Automated Backup
  # -----------------------------------------------------------
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:latest
    container_name: suvidha-postgres-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: suvidha_auth_db
      POSTGRES_USER: suvidha
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suvidha_pass}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - suvidha-net

# =============================================================
#  Volumes & Networks
# =============================================================

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  prometheus_data:
  grafana_data:

networks:
  suvidha-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
