server:
  port: 8085

spring:
  application:
    name: suvidha-notification
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/suvidha_db}
    username: ${POSTGRES_USER:suvidha}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: notification

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
