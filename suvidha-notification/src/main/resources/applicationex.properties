# Example configuration for local development.
# Copy to application.properties (ignored by git) and fill values via env.

server.port=8085

spring.application.name=suvidha-notification

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/suvidha_db}
spring.datasource.username=${POSTGRES_USER:suvidha}
spring.datasource.password=${POSTGRES_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=notification

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

auth.service.url=${AUTH_SERVICE_URL:http://suvidha-auth:8081}

notification.encryption.key=${NOTIFICATION_ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.com.suvidha.notification=INFO
