# Example configuration for local development.
# Copy to application.properties (ignored by git) and fill values via env.

server.port=8083

spring.application.name=suvidha-grievance

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/suvidha_db}
spring.datasource.username=${POSTGRES_USER:suvidha}
spring.datasource.password=${POSTGRES_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=grievance

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
